name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: check version consistency
        run: |
          pubspec=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d+ -f1)
          appstr=$(grep -o "appVersion = 'v[^']*'" lib/constants/app_strings.dart | sed "s/.*'v//;s/'//")
          [ "$pubspec" = "$appstr" ] || { echo "pubspec.yaml ($pubspec) != AppStrings.appVersion ($appstr)"; exit 1; }
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            [ "$GITHUB_REF_NAME" = "v$pubspec" ] || { echo "tag $GITHUB_REF_NAME != v$pubspec"; exit 1; }
          fi

  windows:
    needs: verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: fetch 7-zip
        shell: pwsh
        run: |
          curl.exe -fL -o 7zsetup.exe https://github.com/ip7z/7zip/releases/download/26.02/7z2602-x64.exe
          if ((Get-FileHash 7zsetup.exe -Algorithm SHA256).Hash -ne '6745FA76DC2EA031596D8678F6F6B99C3C1B435B4164A63485ADBBC7B8D82EF0') { throw '7zsetup.exe checksum mismatch' }
          & "C:\Program Files\7-Zip\7z.exe" e 7zsetup.exe -o7zdist 7z.exe 7z.dll License.txt -y
          Copy-Item 7zdist\7z.exe, 7zdist\7z.dll assets\bins\
          Copy-Item 7zdist\License.txt assets\bins\7z-License.txt
          Remove-Item -Recurse -Force 7zsetup.exe, 7zdist
      - name: fetch 7zz for tests
        shell: pwsh
        run: |
          curl.exe -fL -o 7z-linux.tar.xz https://github.com/ip7z/7zip/releases/download/26.02/7z2602-linux-x64.tar.xz
          if ((Get-FileHash 7z-linux.tar.xz -Algorithm SHA256).Hash -ne '41AABA7B1235304AB5AA0624530C67AE829496CD29E875925271EFDCCC28C03E') { throw '7z-linux.tar.xz checksum mismatch' }
          tar -xf 7z-linux.tar.xz -C assets\bins 7zz
          Remove-Item 7z-linux.tar.xz
      - run: flutter pub get
      - run: flutter test
      - name: remove test-only 7zz
        shell: pwsh
        run: Remove-Item assets\bins\7zz
      - run: flutter build windows --release
      - name: package
        shell: pwsh
        run: |
          $version = ((Get-Content pubspec.yaml | Select-String '^version:').Line -replace 'version:\s*', '' -split '\+')[0]
          New-Item -ItemType Directory dist | Out-Null
          Copy-Item -Recurse build\windows\x64\runner\Release "dist\YoRHa Protocol Launcher"
          Remove-Item "dist\YoRHa Protocol Launcher\yp_launcher.exe"
          Compress-Archive -Path "dist\YoRHa Protocol Launcher" -DestinationPath "dist\YoRHa.Protocol.Launcher.v$version.zip"
          Remove-Item -Recurse -Force "dist\YoRHa Protocol Launcher"
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*.zip
          if-no-files-found: error

  macos:
    needs: verify
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: fetch 7zz
        run: |
          curl -fL -o /tmp/7z.tar.xz https://github.com/ip7z/7zip/releases/download/26.02/7z2602-mac.tar.xz
          echo "1cf6760579502f87e591ff5c73a005ec50b3e4d6f507e8b038382d563c3175b9  /tmp/7z.tar.xz" | shasum -a 256 -c
          tar -xf /tmp/7z.tar.xz -C /tmp 7zz License.txt
          codesign --force --sign - /tmp/7zz
          mv /tmp/7zz assets/bins/7zz
          mv /tmp/License.txt assets/bins/7zz-License.txt
      - run: flutter pub get
      - run: flutter test
      - run: bash scripts/build_macos_dmg.sh
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: build/*.dmg
          if-no-files-found: error

  linux:
    needs: verify
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: fetch 7zz
        run: |
          curl -fL -o /tmp/7z.tar.xz https://github.com/ip7z/7zip/releases/download/26.02/7z2602-linux-x64.tar.xz
          echo "41aaba7b1235304ab5aa0624530c67ae829496cd29e875925271efdccc28c03e  /tmp/7z.tar.xz" | sha256sum -c
          tar -xf /tmp/7z.tar.xz -C /tmp 7zz License.txt
          install -m 755 /tmp/7zz assets/bins/7zz
          mv /tmp/License.txt assets/bins/7zz-License.txt
      - name: install appimagetool
        run: |
          sudo curl -fL -o /usr/local/bin/appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          sudo chmod +x /usr/local/bin/appimagetool
      - run: flutter pub get
      - run: flutter test
      - run: bash scripts/build_linux_tarball.sh
      - run: bash scripts/build_linux_appimage.sh
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            dist/*.tar.gz
            dist/*.AppImage
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [windows, macos, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          name: YoRHa Protocol Launcher ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: artifacts/*
