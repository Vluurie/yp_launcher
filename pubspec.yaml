name: yp_launcher
description: "Simple Launcher for YoRHa Protocol with Mod Managing and NAMS Config Editing."

publish_to: 'none'
version: 2.1.6+1

environment:
  sdk: ^3.9.2


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Automato Theme
  automato_theme:
    git:
      url: https://github.com/Vluurie/automato_theme.git
      ref: main 

  # State Management
  flutter_riverpod: ^3.0.0
k
  # File Picker
  file_picker: ^12.0.0-beta.5

  # Windows API
  ffi: ^2.1.3
  win32: ^6.3.0

  # Riverpod code generation
  riverpod_annotation: ^3.0.0

  # Path provider for cross-platform paths
  path_provider: ^2.1.5
  path: ^1.9.0

  # Persistent storage
  shared_preferences: ^2.3.5

  # URL launcher for external links
  url_launcher: ^6.2.5

  # Custom window title bar for Windows
  window_manager: ^0.5.1

  # Fonts
  google_fonts: ^8.1.0

  # Drag and drop support
  desktop_drop: ^0.7.1

  # Archive extraction
  archive: ^4.0.2

  # SHA-256 for game-exe variant detection
  crypto: ^3.0.6
  tutorial_coach_mark: ^1.3.3
  flutter_localizations:
    sdk: flutter
  intl: any
  toml: ^0.18.0
  flutter_markdown_plus: ^1.0.7

dev_dependencies:
  # Riverpod code generation
  build_runner: ^2.4.13
  riverpod_generator: ^3.0.0
  custom_lint: ^0.8.1
  riverpod_lint: ^3.0.0
  flutter_test:
    sdk: flutter

  # Icon generation
  flutter_launcher_icons: ^0.14.3


  flutter_lints: ^5.0.0

flutter_launcher_icons:
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/config/
    - assets/bins/
    - assets/bins/plugins/

